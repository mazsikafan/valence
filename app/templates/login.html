{% extends "_auth_base.html" %}
{% block title %}Sign In{% endblock %}
{% block heading %}Sign In{% endblock %}
{% block subtitle %}Access your diagnostic workspace.{% endblock %}

{% block form %}
<form method="post" action="/login{% if next %}?next={{ next }}{% endif %}">
    <div class="field">
        <label for="email">Institutional Email</label>
        <input id="email" name="email" type="email" required autocomplete="email"
               value="{{ email or '' }}" placeholder="dr.smith@institute.edu">
    </div>
    <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password"
               placeholder="••••••••••••">
    </div>
    <button type="submit" class="submit-btn">
        Authenticate
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="square" d="M5 12h14m0 0l-6-6m6 6l-6 6"/></svg>
    </button>
</form>
{% endblock %}

{% block footnote %}
Don't have an account? <a href="/signup{% if next %}?next={{ next }}{% endif %}">Request Access</a>
{% endblock %}
