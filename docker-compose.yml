services:
  valence:
    build: .
    image: valence-diagnostics:local
    restart: unless-stopped
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results
      - ./models:/app/models:ro
      - ./runs:/app/runs:ro
      - valence-db:/app/var
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  valence-db:
